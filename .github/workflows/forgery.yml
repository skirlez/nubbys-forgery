name: Package Forgery
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      # This step is taken from https://gamemaker.io/en/blog/bs-tech-automate-builds
      - name: Setup Igor
        uses: bscotch/igor-setup@v1.3.0
        id: igor
        with:
          target-yyp: ${{ github.workspace }}/nubbys-forgery.yyp
          access-key: ${{ secrets.GAMEMAKER_ACCESS_KEY }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12' 
          
      - name: Setup Frida
        run: |
          python3 .github/workflows/create_actions_user_config.py ${{ steps.igor.outputs.runtime-dir }} ${{ steps.igor.outputs.user-dir }}
          
      - name: Package Forgery
        run: |
          cd g3man
          echo "User config:"
          cat frida-user-config.jsonc
          python3 frida.py package
          rm out/profile.json
          
      # can't use `frida.py package --zip` or it would create nested zips, so we just remove out/profile.json in the earlier step
      - name: Upload g3man mod
        uses: actions/upload-artifact@v6
        with:
          name: forgery
          path: g3man/out
